function getThreshold() {
  if (curTab === 0) return 3000;
  if (curTab === 1) return 2000;
  if (curTab === 2) return 1000;
  if (curTab === 4) return customThreshold;
  return 3000;
}

function getSegment4(d, thr) {
  if (!d.emp || !d.rep) return null;
  if (d.rep==='O' && d.emp>=thr) return 1;
  if (d.rep==='X' && d.emp>=thr) return 2;
  if (d.rep==='X' && d.emp<thr) return 3;
  if (d.rep==='O' && d.emp<thr) return 4;
  return null;
}

function getSegment6(d) {
  if (!d.emp || !d.rep) return null;
  const hi = d.emp >= 3000, mid = d.emp >= 1000 && d.emp < 3000, lo = d.emp < 1000;
  const o = d.rep === 'O';
  if (o && hi) return 1;
  if (!o && hi) return 2;
  if (o && mid) return 3;
  if (!o && mid) return 4;
  if (o && lo) return 5;
  if (!o && lo) return 6;
  return null;
}

function getCurSeg(d) {
  return curTab === 3 ? getSegment6(d) : getSegment4(d, getThreshold());
}

function getSegInfo(n) {
  return curTab === 3 ? SEG6_INFO[n] : SEG4_INFO(getThreshold())[n];

function goTab(n) {
  curTab = n; selSeg = null; selSector = 'all';
  [0,1,2,3,4].forEach(i => {
    document.getElementById('tab'+i).classList.toggle('active', i===n);
  });
  renderPage();
}

function renderPage() {
  const body = document.getElementById('pageBody');
  if (curTab === 3) renderPage6(body);
  else renderPage4(body, getThreshold());
}

function bindP5Events() {
  const inp = document.getElementById('thrInput');
  if (!inp) return;
  inp.addEventListener('input', () => {
    const v = parseInt(inp.value);
    if (!isNaN(v) && v > 0) {
      customThreshold = v;
      selSeg = null;
      renderPage();
    }
  });
}

function setPreset(v) {
  customThreshold = v;
  selSeg = null;
  renderPage();
}

function renderPDCAHtml() {
  return `<div class="pdca-list">${PDCA_DATA.map((p,i)=>`

function toggleP(i) {
  const b=document.getElementById('pb'+i), c=document.getElementById('pc'+i);
  const open=b.classList.toggle('open');
  if(c) c.style.transform=open?'rotate(180deg)':'';
}

function getFiltered() {
  const q=(document.getElementById('searchInp')||{value:''}).value.toLowerCase();
  const sv=(document.getElementById('sortSel')||{value:''}).value||'';
  let rows=[...DB];
  if(selSector!=='all') rows=rows.filter(d=>d.cat1===selSector);
  if(selSeg!==null) rows=rows.filter(d=>getCurSeg(d)===selSeg);
  if(q) rows=rows.filter(d=>d.name.toLowerCase().includes(q)||d.cat1.includes(q)||d.cat2.includes(q));
  if(sv) rows.sort((a,b)=>{
    if(sv==='emp_desc') return (b.emp||0)-(a.emp||0);
    if(sv==='emp_asc') return (a.emp||0)-(b.emp||0);
    if(sv==='name_asc') return a.name.localeCompare(b.name,'ko');
    if(sv==='name_desc') return b.name.localeCompare(a.name,'ko');
    if(sv==='seg') return ((getCurSeg(a)||99)-(getCurSeg(b)||99));
    if(sv==='cat1') return a.cat1.localeCompare(b.cat1,'ko');
    if(sv==='rep_o') return (b.rep||'').localeCompare(a.rep||'');
    return 0;
  });
  if(sortCol) {
    const k=sortCol,dir=sortDir;
    rows.sort((a,b)=>{
      if(k==='emp') return ((b.emp||0)-(a.emp||0))*dir;
      if(k==='seg') return ((getCurSeg(a)||99)-(getCurSeg(b)||99))*dir;
      return String(a[k]||'').localeCompare(String(b[k]||''),'ko')*dir;
    });
  }
  return rows;
}

function getSegBadge(n) {
  if(!n) return '<span class="badge bna">미분류</span>';
  const inf=curTab===3?SEG6_INFO[n]:SEG4_INFO(getThreshold())[n];
  return `<span class="badge ${inf.bCls}">${inf.label}</span>`;
}

      <table>
        <thead><tr>
          <th style="width:32px">#</th>
          <th onclick="colSort('name')" title="정렬">기관명<span id="sa-name"></span></th>
          <th onclick="colSort('cat1')">업종 대분류<span id="sa-cat1"></span></th>
          <th onclick="colSort('cat2')">업종 소분류<span id="sa-cat2"></span></th>
          <th onclick="colSort('group')">소속 지주<span id="sa-group"></span></th>
          <th onclick="colSort('emp')" style="text-align:right">임직원수<span id="sa-emp"></span></th>
          <th onclick="colSort('rep')" style="text-align:center">담당자<span id="sa-rep"></span></th>
          <th onclick="colSort('sol')" style="text-align:center">솔루션<span id="sa-sol"></span></th>
          <th>${segLabel}</th>
          <th style="min-width:120px">비고 / 기록</th>
          <th style="text-align:center">관리</th>
        </tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>
    <div class="tfoot">
      <span>${rows.length}개 표시 / 전체 ${DB.length}개</span>
      <span>인라인 메모 편집 가능</span>
    </div>
  </div>`;
}

function bindTableEvents() {
  document.querySelectorAll('.note-inp').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      const id=parseInt(inp.dataset.id);
      const d=DB.find(x=>x.id===id);
      if(d) d.note=inp.value;
    });
  });
}

function colSort(key) {
  if(sortCol===key) sortDir*=-1; else{sortCol=key;sortDir=1;}
  refreshTable();
}

function setSector(s) {
  selSector=s; refreshTable();
}

function toggleSeg(n) {
  selSeg = (selSeg===n) ? null : n;
  renderPage();
}

function clearAllFilters() {
  selSeg=null; selSector='all'; sortCol=''; sortDir=1;
  renderPage();
}

function refreshTable() {
  const sect = document.querySelector('.table-section');
  if(!sect) return;
  sect.outerHTML = renderTableHtml();
  bindTableEvents();
}

let editId=null;
function openModal(id) {
  editId=id;
  document.getElementById('mTitle').textContent=id?'기관 정보 편집':'신규 금융기관 추가';
  document.getElementById('recModal').classList.add('open');
  if(id){
    const d=DB.find(x=>x.id===id); if(!d)return;
    document.getElementById('f-name').value=d.name||'';
    document.getElementById('f-cat1').value=d.cat1||'1금융권';
    document.getElementById('f-cat2').value=d.cat2||'';
    document.getElementById('f-group').value=d.group||'';
    document.getElementById('f-emp').value=d.emp||'';
    document.getElementById('f-rep').value=d.rep||'';
    document.getElementById('f-sol').value=d.sol||'';
    document.getElementById('f-note').value=d.note||'';
  } else {
    ['f-name','f-cat2','f-group','f-emp','f-note'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('f-cat1').value='1금융권';
    document.getElementById('f-rep').value='O';
    document.getElementById('f-sol').value='O';
  }
}
function closeModal(){document.getElementById('recModal').classList.remove('open');}
function saveRecord(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('기관명을 입력해주세요.');return;}
  const rec={
    id:editId||++nextId,name,
    cat1:document.getElementById('f-cat1').value,
    cat2:document.getElementById('f-cat2').value.trim(),
    group:document.getElementById('f-group').value.trim()||'-',
    emp:parseInt(document.getElementById('f-emp').value)||null,
    rep:document.getElementById('f-rep').value||null,
    sol:document.getElementById('f-sol').value||null,
    note:document.getElementById('f-note').value.trim(),
  };
  if(editId){const i=DB.findIndex(x=>x.id===editId);if(i>=0)DB[i]=rec;}
  else DB.push(rec);
  closeModal(); renderPage();
}
function delRecord(id){
  if(!confirm('이 기관을 삭제하시겠습니까?'))return;
  DB=DB.filter(x=>x.id!==id); renderPage();
}
document.getElementById('recModal').addEventListener('click',function(e){if(e.target===this)closeModal();});

renderPage();
</script>
