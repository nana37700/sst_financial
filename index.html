<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>금융권 전략영업 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#F0EFE9;color:#1A1916;min-height:100vh}
button{font-family:'Pretendard',-apple-system,sans-serif;cursor:pointer}
input,select{font-family:'Pretendard',-apple-system,sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C8C6BC;border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:#9B9890}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;height:56px;background:#fff;border-bottom:1px solid #E2E0D8;display:flex;align-items:center;justify-content:space-between;padding:0 24px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;border-radius:8px;background:#1A56DB;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;flex-shrink:0}
.brand-title{font-size:15px;font-weight:700;color:#1A1916}
.brand-sub{font-size:11px;color:#9B9890;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.cur-badge{font-size:12px;font-weight:700;color:#1A56DB;padding:3px 10px;background:#EEF4FF;border-radius:99px;border:1px solid #BDD0FD}

/* TABS */
.tabnav{background:#fff;border-bottom:1px solid #E2E0D8;padding:0 24px;display:flex;gap:0;overflow-x:auto}
.tabnav button{padding:12px 22px;border:none;border-bottom:2.5px solid transparent;background:transparent;color:#5C5A54;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.tabnav button span.pg{font-size:10px;color:#9B9890}
.tabnav button.active{color:#1A56DB;border-bottom-color:#1A56DB;font-weight:700}
.tabnav button.active span.pg{color:#1A56DB}

/* PAGE */
.page{padding:20px 24px;max-width:1920px;margin:0 auto;display:none}
.page.active{display:block}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:#fff;border:1px solid #E2E0D8;border-radius:12px;padding:12px 16px 12px 20px;position:relative;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.stat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:12px 0 0 12px}
.stat-card:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.08)}
.stat-card.sel{border-width:1.5px}
.stat-label{font-size:10px;font-weight:600;color:#9B9890;text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px}
.stat-val{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.schip{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px}

/* QUAD GRID */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.panel{background:#fff;border:1px solid #E2E0D8;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.panel-title{font-size:13px;font-weight:700;color:#1A1916;margin-bottom:3px}
.panel-sub{font-size:11px;color:#9B9890;margin-bottom:12px}
.panel-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}

.quad-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;height:300px}
.hex-grid{display:flex;flex-direction:column;gap:8px}
.hex-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.qcard{border-radius:10px;border:1.5px solid transparent;padding:12px 13px;display:flex;flex-direction:column;gap:5px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.qcard:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.qcard.active{transform:translateY(-2px)}
.qcard::after{content:attr(data-q);position:absolute;right:8px;top:4px;font-size:46px;font-weight:900;opacity:.055;line-height:1;pointer-events:none}
.qcard-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;color:#fff;letter-spacing:.3px;display:inline-block;width:fit-content}
.qcard-cond{font-size:11px;color:#5C5A54;line-height:1.5;margin-top:2px}
.qcard-bottom{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between}
.qcard-count{font-size:32px;font-weight:900;line-height:1;letter-spacing:-1.5px}
.qcard-pct{font-size:17px;font-weight:700;opacity:.7;line-height:1}
.qcard-pct-lbl{font-size:10px;color:#9B9890}
.qcard-bar{height:4px;border-radius:99px;background:rgba(0,0,0,.07);overflow:hidden;margin-top:5px;width:80px}
.qcard-bar-fill{height:100%;border-radius:99px;transition:width .5s}

.hcard{border-radius:8px;border:1.5px solid transparent;padding:10px 12px;display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:all .18s}
.hcard:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.08)}
.hcard.active{transform:translateY(-1px)}
.hcard-tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;color:#fff;display:inline-block;width:fit-content}
.hcard-cond{font-size:10px;color:#5C5A54;line-height:1.5}
.hcard-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:3px}
.hcard-count{font-size:22px;font-weight:900;line-height:1;letter-spacing:-1px}
.hcard-bar{flex:1;height:4px;border-radius:99px;background:rgba(0,0,0,.07);overflow:hidden;margin-left:10px}
.hcard-bar-fill{height:100%;border-radius:99px}

/* AXIS LABELS */
.axis-wrap{display:flex;gap:8px;align-items:stretch}
.axis-y{writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;color:#9B9890;text-align:center;width:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.axis-center{flex:1}
.axis-x{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:7px}
.axis-x-lbl{font-size:10px;color:#9B9890;text-align:center}

/* SECTOR BARS */
.sector-bar-row{margin-bottom:9px}
.sector-bar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.sector-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bar-track{height:6px;background:#F0EFE9;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .5s}

/* CUSTOM INPUT */
.custom-bar{background:#EEF4FF;border:1px solid #BDD0FD;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.custom-bar label{font-size:13px;font-weight:700;color:#1A4FCC}
.custom-inp{width:110px;padding:6px 10px;border:2px solid #1A56DB;border-radius:6px;font-size:14px;font-weight:700;color:#1A56DB;background:#fff;outline:none;text-align:center;font-family:inherit}
.quick-btns{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.qbtn{padding:4px 10px;border-radius:99px;border:1px solid #BDD0FD;background:transparent;color:#1A4FCC;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.qbtn:hover,.qbtn.active{background:#1A56DB;color:#fff;border-color:#1A56DB}

/* FILTER BANNER */
.filter-banner{background:#EEF4FF;border:1px solid #BDD0FD;border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:8px;font-size:12px;color:#1A4FCC;margin-bottom:12px}
.filter-banner.hidden{display:none}
.clr-btn{margin-left:auto;padding:2px 10px;border:1px solid #1A56DB;border-radius:99px;background:transparent;color:#1A56DB;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}

/* 6-ZONE TIER CARDS */
.tier-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.tier-card{border-radius:10px;padding:12px 14px;border:1px solid transparent}
.tier-label{font-size:11px;font-weight:700;margin-bottom:6px}
.tier-val{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
.tier-badges{display:flex;gap:6px}
.tier-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;background:rgba(255,255,255,.7)}

/* TABLE */
.table-section{background:#fff;border:1px solid #E2E0D8;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.table-toolbar{padding:10px 14px;border-bottom:1px solid #E2E0D8;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:150px}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#9B9890;width:14px;height:14px;pointer-events:none}
.search-inp{width:100%;padding:7px 10px 7px 30px;border:1px solid #E2E0D8;border-radius:6px;background:#F8F7F3;color:#1A1916;font-size:12px;outline:none;font-family:inherit}
.search-inp:focus{border-color:#1A56DB;background:#fff}
.fchips{display:flex;gap:4px;flex-wrap:wrap}
.fchip{padding:5px 10px;border-radius:99px;border:1px solid #E2E0D8;background:transparent;color:#5C5A54;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.fchip:hover{background:#F8F7F3;border-color:#C8C6BC}
.fchip.on{background:#1A56DB;color:#fff;border-color:#1A56DB}
.sort-sel{padding:6px 10px;border:1px solid #E2E0D8;border-radius:6px;background:#F8F7F3;color:#1A1916;font-size:12px;cursor:pointer;outline:none;min-width:120px;font-family:inherit}
.add-btn{padding:7px 13px;background:#1A56DB;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;transition:opacity .15s;white-space:nowrap}
.add-btn:hover{opacity:.88}
.dl-btn{padding:7px 13px;background:#0E9B5A;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;transition:opacity .15s;white-space:nowrap}
.dl-btn:hover{opacity:.88}

.table-scroll{overflow:auto;max-height:420px}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:880px}
thead{position:sticky;top:0;z-index:5}
th{background:#F8F7F3;padding:8px 10px;text-align:left;font-weight:700;color:#5C5A54;border-bottom:1.5px solid #E2E0D8;white-space:nowrap;font-size:11px;cursor:pointer;user-select:none}
th:hover{color:#1A1916}
th.sort-on{color:#1A56DB}
td{padding:7px 10px;border-bottom:1px solid #E2E0D8;color:#1A1916;vertical-align:middle}
tr:hover td{background:#F8F7F3}
td.num{text-align:right;font-variant-numeric:tabular-nums}
td.ctr{text-align:center}
.badge{display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap;letter-spacing:.2px}
.b-ok{background:#EDFDF4;color:#0A7A45}
.b-no{background:#FEF0F0;color:#B52022}
.b-na{background:#F1F0EB;color:#9B9890}
.note-inp{width:100%;padding:4px 7px;border:1px solid transparent;border-radius:5px;background:transparent;color:#1A1916;font-size:11px;font-family:inherit;transition:all .15s;min-width:110px}
.note-inp:hover{border-color:#E2E0D8;background:#F8F7F3}
.note-inp:focus{border-color:#1A56DB;background:#fff;outline:none}
.act-btn{padding:3px 8px;border-radius:5px;border:1px solid #E2E0D8;background:transparent;color:#5C5A54;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.act-btn:hover{background:#F8F7F3;border-color:#C8C6BC}
.act-btn.del{color:#B52022;border-color:#FCBDBD}
.act-btn.del:hover{background:#FEF0F0}
.table-foot{padding:8px 14px;border-top:1px solid #E2E0D8;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#9B9890}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);border:1px solid #E2E0D8;animation:su .2s ease}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.modal-title{font-size:16px;font-weight:800;color:#1A1916;margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg label{font-size:11px;font-weight:700;color:#5C5A54}
.fg label em{color:#D9292B;font-style:normal}
.form-inp{padding:8px 10px;border:1px solid #E2E0D8;border-radius:6px;background:#F8F7F3;color:#1A1916;font-size:13px;outline:none;width:100%;font-family:inherit}
.form-inp:focus{border-color:#1A56DB;background:#fff}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid #E2E0D8}
.btn-cancel{padding:8px 18px;border:1px solid #E2E0D8;border-radius:6px;background:transparent;color:#5C5A54;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-save{padding:8px 20px;background:#1A56DB;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

/* RESPONSIVE */
@media(max-width:900px){
  .two-col{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .tier-cards{grid-template-columns:1fr}
  .page{padding:12px}
  .topbar,.tabnav{padding:0 12px}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">F</div>
    <div>
      <div class="brand-title">금융권 전략영업 데이터 관리 대시보드</div>
      <div class="brand-sub" id="topSub">대한민국 금융권 전수 리스트 2026 · 120개 핵심 기관 · PDCA 전략 실행</div>
    </div>
  </div>
  <div class="topbar-right">
    <span style="font-size:12px;color:#9B9890">현재 기준:</span>
    <span class="cur-badge" id="curBadge">3,000명</span>
  </div>
</div>

<!-- TAB NAV -->
<div class="tabnav" id="tabNav">
  <button class="active" onclick="switchTab(0)"><span class="pg">페이지 1</span>기준 3,000명</button>
  <button onclick="switchTab(1)"><span class="pg">페이지 2</span>기준 2,000명</button>
  <button onclick="switchTab(2)"><span class="pg">페이지 3</span>기준 1,000명</button>
  <button onclick="switchTab(3)"><span class="pg">페이지 4</span>6분면 분석</button>
  <button onclick="switchTab(4)"><span class="pg">페이지 5</span>사용자 정의</button>
</div>

<!-- PAGES 0-2 + 4: quadrant -->
<div class="page active" id="page0" data-threshold="3000"></div>
<div class="page" id="page1" data-threshold="2000"></div>
<div class="page" id="page2" data-threshold="1000"></div>
<!-- PAGE 3: 6-zone -->
<div class="page" id="page3"></div>
<!-- PAGE 4: custom -->
<div class="page" id="page4" data-threshold="3000"></div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">신규 금융기관 추가</div>
    <div class="form-grid">
      <div class="fg full"><label>기관명 <em>*</em></label><input class="form-inp" id="fName" placeholder="예: KB국민은행"></div>
      <div class="fg"><label>업종 대분류</label>
        <select class="form-inp" id="fCat1">
          <option>1금융권</option><option>2금융권</option><option>보험업권</option><option>금융지주</option><option>기타금융</option>
        </select></div>
      <div class="fg"><label>업종 소분류</label><input class="form-inp" id="fCat2" placeholder="예: 시중은행"></div>
      <div class="fg full"><label>소속 지주</label><input class="form-inp" id="fGroup" placeholder="없으면 -"></div>
      <div class="fg"><label>임직원수</label><input class="form-inp" id="fEmp" type="number" placeholder="숫자만 (예: 15700)"></div>
      <div class="fg"><label>담당자 확인</label>
        <select class="form-inp" id="fRep"><option value="O">O (확인 완료)</option><option value="X">X (미확인)</option><option value="">미입력</option></select></div>
      <div class="fg"><label>솔루션 사용</label>
        <select class="form-inp" id="fSol"><option value="O">O (사용 중)</option><option value="X">X (미사용)</option><option value="">미입력</option></select></div>
      <div class="fg full"><label>비고 / 기록</label><input class="form-inp" id="fNote" placeholder="메모 입력..."></div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveRecord()">저장</button>
    </div>
  </div>
</div>

<script>

  {id:8,name:"NH농협은행",cat1:"1금융권",cat2:"특수은행",group:"NH농협금융지주",emp:13800,rep:"O",sol:"O"},
  {id:9,name:"IBK기업은행",cat1:"1금융권",cat2:"특수은행",group:"-",emp:12400,rep:"X",sol:"O"},
  {id:10,name:"KDB산업은행",cat1:"1금융권",cat2:"특수은행",group:"-",emp:3450,rep:"O",sol:"O"},
  {id:11,name:"한국수출입은행",cat1:"1금융권",cat2:"특수은행",group:"-",emp:1300,rep:"O",sol:"O"},
  {id:12,name:"Sh수협은행",cat1:"1금융권",cat2:"특수은행",group:"-",emp:2150,rep:"O",sol:"O"},
  {id:13,name:"BNK부산은행",cat1:"1금융권",cat2:"지방은행",group:"BNK금융지주",emp:2800,rep:"O",sol:"O"},

  if(d.rep==="X"&&d.emp<thr)  return "q3";
  if(d.rep==="O"&&d.emp<thr)  return "q4";
  return null;
}
function getQ6(d){
  if(!d.emp||!d.rep) return null;
  const H=3000,M=1000;
  if(d.rep==="O"&&d.emp>=H)         return "q1";
  if(d.rep==="O"&&d.emp>=M&&d.emp<H) return "q6";
  if(d.rep==="O"&&d.emp<M)           return "q4";
  if(d.rep==="X"&&d.emp>=H)          return "q2";
  if(d.rep==="X"&&d.emp>=M&&d.emp<H) return "q5";
  if(d.rep==="X"&&d.emp<M)           return "q3";
  return null;
}

let customThr=3000;
const pageState=[
  {zone:null,sector:"all",search:"",sort:"name",dir:1},
  {zone:null,sector:"all",search:"",sort:"name",dir:1},
  {zone:null,sector:"all",search:"",sort:"name",dir:1},
  {zone:null,sector:"all",search:"",sort:"name",dir:1},
  {zone:null,sector:"all",search:"",sort:"name",dir:1},
];

function getThreshold(tab){
  if(tab===0) return 3000;
  if(tab===1) return 2000;
  if(tab===2) return 1000;
  if(tab===3) return null;
  return customThr;
}
function getClassifier(tab){
  if(tab===3) return d=>getQ6(d);
  const thr=getThreshold(tab);
  return d=>getQ4(d,thr);
}

/* ════════════════════════════════════════
   EXCEL DOWNLOAD
════════════════════════════════════════ */
function downloadExcel(rows, filename, tabLabel, threshold) {
  const wb = XLSX.utils.book_new();

  // ── Sheet 1: 현재 리스트 ─────────────
  const hdrs = ["#","기관명","업종 대분류","업종 소분류","소속 지주","임직원수","담당자 확인","솔루션 사용","사분면","비고/기록"];
  const classify = threshold===null ? d=>getQ6(d) : d=>getQ4(d,threshold);
  const wsData = [hdrs, ...rows.map((d,i)=>{
    const qk = classify(d);
    const qLabel = qk ? PAL[qk].lbl : "미분류";
    return [i+1, d.name, d.cat1, d.cat2, d.group||"-", d.emp||"", d.rep||"", d.sol||"", qLabel, notes[d.id]||""];
  })];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  // Column widths
  ws['!cols'] = [{wch:4},{wch:22},{wch:10},{wch:12},{wch:18},{wch:9},{wch:10},{wch:10},{wch:12},{wch:30}];
  // Style header row (bold via s property — xlsx-js supports limited styling)
  XLSX.utils.book_append_sheet(wb, ws, "영업 리스트");

  // ── Sheet 2: 사분면 요약 ─────────────
  const qKeys = threshold===null ? ["q1","q2","q3","q4","q5","q6"] : ["q1","q2","q3","q4"];
  const summary = [["사분면","명칭","조건","기관 수","비율(%)"]];
  const total = rows.filter(d=>classify(d)!==null).length||1;
  qKeys.forEach(qk=>{
    const cnt = rows.filter(d=>classify(d)===qk).length;
    const condMap = {
      q1: threshold===null?"담당자O · 3,000명+":`담당자O · ${(threshold||0).toLocaleString()}명+`,
      q2: threshold===null?"담당자X · 3,000명+":`담당자X · ${(threshold||0).toLocaleString()}명+`,
      q3: threshold===null?"담당자X · 1,000명 미만":`담당자X · ${(threshold||0).toLocaleString()}명 미만`,
      q4: threshold===null?"담당자O · 1,000명 미만":`담당자O · ${(threshold||0).toLocaleString()}명 미만`,
      q5:"담당자X · 1,000~3,000명", q6:"담당자O · 1,000~3,000명"
    };
    summary.push([qk.toUpperCase(), PAL[qk].lbl, condMap[qk]||"", cnt, Math.round(cnt/total*100)+"%"]);
  });
  const ws2 = XLSX.utils.aoa_to_sheet(summary);
  ws2['!cols'] = [{wch:6},{wch:12},{wch:22},{wch:8},{wch:8}];
  XLSX.utils.book_append_sheet(wb, ws2, "사분면 요약");

  // ── Sheet 3: 업종별 집계 ─────────────
  const sectors = ["1금융권","2금융권","보험업권","금융지주","기타금융"];
  const aggHdrs = ["업종 대분류","총 기관수","담당자O","담당자X","솔루션O","솔루션X","미입력"];
  const aggData = [aggHdrs, ...sectors.map(s=>{
    const sd = rows.filter(d=>d.cat1===s);
    return [s, sd.length,
      sd.filter(d=>d.rep==="O").length,
      sd.filter(d=>d.rep==="X").length,
      sd.filter(d=>d.sol==="O").length,
      sd.filter(d=>d.sol==="X").length,
      sd.filter(d=>!d.sol).length
    ];
  })];
  const ws3 = XLSX.utils.aoa_to_sheet(aggData);
  ws3['!cols'] = [{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws3, "업종별 집계");

  XLSX.writeFile(wb, filename);
}

function badgeHTML(qk){
  if(!qk) return '<span class="badge b-na">미분류</span>';
  const p=PAL[qk];
  return `<span class="badge" style="background:${p.bg};color:${p.txt};border:1px solid ${p.bdr}">${p.lbl}</span>`;
}
function ynBadge(v){
  if(!v) return '<span class="badge b-na">-</span>';
  return v==="O"?'<span class="badge b-ok">O</span>':'<span class="badge b-no">X</span>';
}

function getTableRows(tab){
  const st=pageState[tab];
  const classify=getClassifier(tab);
  let rows=[...DB];
  if(st.sector!=="all") rows=rows.filter(d=>d.cat1===st.sector);
  if(st.zone) rows=rows.filter(d=>classify(d)===st.zone);
  if(st.search){
    const q=st.search.toLowerCase();
    rows=rows.filter(d=>d.name.toLowerCase().includes(q)||d.cat1.includes(q)||d.cat2.includes(q)||(d.group||"").includes(q));
  }
  rows.sort((a,b)=>{
    const k=st.sort,dir=st.dir;
    if(k==="emp") return ((b.emp||0)-(a.emp||0))*dir;
    if(k==="quad"){const qa=classify(a)||"z",qb=classify(b)||"z";return qa.localeCompare(qb)*dir;}
    return String(a[k]||"").localeCompare(String(b[k]||""),"ko")*dir;
  });
  return rows;
}

function renderSectorBars(tab, rows){
  const el=document.getElementById(`t${tab}_sectorbars`);

  el.innerHTML=Object.entries(SECTOR_COL).map(([s,color])=>{
    const tot=DB.filter(d=>d.cat1===s).length;
    const cur=rows.filter(d=>d.cat1===s).length;
    const pct=tot?Math.round(cur/tot*100):0;
    return `<div class="sector-bar-row">

      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;

}

function renderQuadCounts(tab){
  const classify=getClassifier(tab);
  const cnt={q1:0,q2:0,q3:0,q4:0,q5:0,q6:0};
  DB.forEach(d=>{const q=classify(d);if(q)cnt[q]++;});
  const total=Object.values(cnt).reduce((a,b)=>a+b,0)||1;
  const keys=tab===3?["q1","q2","q5","q6","q3","q4"]:["q1","q2","q3","q4"];
  keys.forEach(qk=>{
    const pct=Math.round(cnt[qk]/total*100);
    ["_card_","_stat_"].forEach(pfx=>{
      const fill=document.getElementById(`t${tab}${pfx}${qk}_fill`);
      if(fill) fill.style.width=pct+"%";
      const cntEl=document.getElementById(`t${tab}${pfx}${qk}_cnt`);
      if(cntEl) cntEl.textContent=cnt[qk];
      const pctEl=document.getElementById(`t${tab}${pfx}${qk}_pct`);
      if(pctEl) pctEl.textContent=pct+"%";
    });
    const sc=document.getElementById(`t${tab}_stat_${qk}`);
    if(sc){
      if(pageState[tab].zone===qk) sc.classList.add("sel");
      else sc.classList.remove("sel");
    }
  });
}

            <span style="font-size:10px;color:#9B9890" id="${pfx}_card_${zd.qk}_pct">0%</span>
          </div>
          <div class="hcard-cond">${zd.cond}</div>
          <div class="hcard-bottom">
            <div class="hcard-count" style="color:${p.acc}" id="${pfx}_card_${zd.qk}_cnt">0</div>
            <div class="hcard-bar"><div class="hcard-bar-fill" style="background:${p.acc}" id="${pfx}_card_${zd.qk}_fill"></div></div>
          </div>
        </div>`;
      }).join("")}
    </div>`).join("");

  const tierCards=`
    <div class="tier-cards">
      ${[
        {label:"대형 기관 (3,000명+)",zones:["q1","q2"],color:"#1A56DB",bg:"#EEF4FF"},
        {label:"중간 기관 (1,000~3,000명)",zones:["q5","q6"],color:"#7C3AED",bg:"#F5F3FF"},
        {label:"소형 기관 (~1,000명)",zones:["q3","q4"],color:"#0E9B5A",bg:"#EDFDF4"},
      ].map(({label,zones,color,bg})=>`
        <div class="tier-card" style="background:${bg};border-color:${color}30">
          <div class="tier-label" style="color:${color}">${label}</div>
          <div class="tier-val" style="color:${color}" id="tier_${zones.join("_")}">0개</div>
          <div class="tier-badges">
            <span class="tier-badge" style="color:#0A7A45" id="tier_o_${zones.join("_")}">담당자O: 0</span>
            <span class="tier-badge" style="color:#B52022" id="tier_x_${zones.join("_")}">담당자X: 0</span>
          </div>
        </div>`).join("")}
    </div>`;

  return `
    ${statCards}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">6분면 분석 — 담당자 확인 × 직원 규모 (3단계)</div>
            <div class="panel-sub">Y축 구분: 3,000명 이상 / 1,000~3,000명 / 1,000명 미만</div>
          </div>
          <button class="act-btn" onclick="clearZone(3)">전체 보기</button>
        </div>
        <div style="display:flex;gap:10px">
          <div style="display:flex;flex-direction:column;justify-content:space-around;width:18px;gap:4px">
            ${["대형(3k+)","중간(1k~3k)","소형(~1k)"].map((l,i)=>`
              <div style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:9px;font-weight:700;color:${tierCols[i]};text-align:center;flex:1;display:flex;align-items:center;justify-content:center">${l}</div>`).join("")}
          </div>
          <div style="flex:1">
            <div class="hex-grid">${hexGrid}</div>
            <div class="axis-x" style="margin-top:8px">
              <div class="axis-x-lbl">◀ 담당자 확인 X (미확인)</div>
              <div class="axis-x-lbl">담당자 확인 O (완료) ▶</div>
            </div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title" style="margin-bottom:12px">업종별 분포 현황</div>
        <div id="${pfx}_sectorbars"></div>
      </div>
    </div>
    ${tierCards}
    <div class="filter-banner hidden" id="${pfx}_banner"></div>
    ${buildTableHTML(3)}`;
}

/* ════════════════════════════════════════
   BUILD TABLE HTML
════════════════════════════════════════ */
function buildTableHTML(tab){
  const pfx=`t${tab}`;
  const sectors=["all","1금융권","2금융권","보험업권","금융지주","기타금융"];
  return `
    <div class="table-section">
      <div class="table-toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="5"/><path d="M15 15l-3-3"/></svg>
          <input class="search-inp" id="${pfx}_search" placeholder="기관명·업종 검색..."
            oninput="pageState[${tab}].search=this.value;renderTable(${tab})">
        </div>
        <div class="fchips">
          ${sectors.map(s=>`<button class="fchip ${s==="all"?"on":""}" id="${pfx}_fc_${s.replace(/\//g,"")}"
            onclick="setSector(${tab},'${s}')">${s==="all"?"전체":s}</button>`).join("")}
        </div>
        <select class="sort-sel" id="${pfx}_sort" onchange="setSort(${tab},this.value)">
          <option value="name">기관명 ↑</option>
          <option value="emp">직원수 많은 순</option>
          <option value="quad">사분면 순</option>
          <option value="cat1">업종 대분류</option>
          <option value="rep">담당자 확인 순</option>
          <option value="sol">솔루션 사용 순</option>
        </select>
        <button class="add-btn" onclick="openEditModal(null)">+ 신규 추가</button>
        <button class="dl-btn" id="${pfx}_dlbtn">
          <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10 3v10M5 13l5 5 5-5"/><path d="M3 17h14"/></svg>
          엑셀 다운로드
        </button>
      </div>
      <div class="filter-banner hidden" id="${pfx}_banner2"></div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th style="width:36px">#</th>
              <th onclick="colSort(${tab},'name')">기관명 <span id="${pfx}_sa_name">↕</span></th>
              <th onclick="colSort(${tab},'cat1')">업종 대분류 <span id="${pfx}_sa_cat1">↕</span></th>
              <th onclick="colSort(${tab},'cat2')">업종 소분류 <span id="${pfx}_sa_cat2">↕</span></th>
              <th onclick="colSort(${tab},'group')">소속 지주 <span id="${pfx}_sa_group">↕</span></th>
              <th onclick="colSort(${tab},'emp')" style="text-align:right">임직원수 <span id="${pfx}_sa_emp">↕</span></th>
              <th style="text-align:center">담당자 확인</th>
              <th style="text-align:center">솔루션 사용</th>
              <th onclick="colSort(${tab},'quad')">사분면 <span id="${pfx}_sa_quad">↕</span></th>
              <th style="min-width:140px">비고 / 기록</th>
              <th style="text-align:center;min-width:100px">관리</th>
            </tr>
          </thead>
          <tbody id="${pfx}_tbody"></tbody>
        </table>
      </div>
      <div class="table-foot">
        <span id="${pfx}_count">-</span>
        <span>비고란 직접 편집 · 행별 편집·삭제 · 엑셀 다운로드 가능</span>
      </div>
    </div>`;
}

/* ════════════════════════════════════════
   INTERACTION HANDLERS
════════════════════════════════════════ */
function toggleZone(tab,qk){
  pageState[tab].zone=pageState[tab].zone===qk?null:qk;
  renderTable(tab);
  // update card active styles
  updateCardActive(tab);
}
function clearZone(tab){
  pageState[tab].zone=null;
  renderTable(tab);
  updateCardActive(tab);
}
function updateCardActive(tab){
  const keys=tab===3?["q1","q2","q3","q4","q5","q6"]:["q1","q2","q3","q4"];
  const zone=pageState[tab].zone;
  const pfx=`t${tab}`;
  keys.forEach(qk=>{
    const el=document.getElementById(`${pfx}_card_${qk}`);
    if(!el) return;
    const p=PAL[qk];
    if(zone===qk){
      el.style.borderColor=p.acc;
      el.style.boxShadow=`0 0 0 3px ${p.bdr},0 6px 20px rgba(0,0,0,.1)`;
      el.style.transform="translateY(-2px)";
    } else {
      el.style.borderColor=p.bdr;
      el.style.boxShadow="none";
      el.style.transform="none";
    }
    // stat cards
    const sc=document.getElementById(`${pfx}_stat_${qk}`);
    if(sc){
      if(zone===qk){sc.style.borderColor=p.acc;sc.style.background=p.bg;}
      else{sc.style.borderColor="#E2E0D8";sc.style.background="#fff";}
    }
  });
}

function setSector(tab,s){
  pageState[tab].sector=s;
  const pfx=`t${tab}`;
  document.querySelectorAll(`[id^="${pfx}_fc_"]`).forEach(btn=>btn.classList.remove("on"));
  const el=document.getElementById(`${pfx}_fc_${s.replace(/\//g,"")}`);
  if(el) el.classList.add("on");
  renderTable(tab);
}
function setSort(tab,v){
  pageState[tab].sort=v;
  renderTable(tab);
}
function colSort(tab,col){
  const st=pageState[tab];
  if(st.sort===col) st.dir*=-1; else{st.sort=col;st.dir=1;}
  renderTable(tab);
}

/* ════════════════════════════════════════
   CUSTOM THRESHOLD (PAGE 4)
════════════════════════════════════════ */
function updateCustom(v){
  customThr=v||0;
  document.getElementById("page4").setAttribute("data-threshold",customThr);
  document.getElementById("curBadge").textContent=customThr.toLocaleString()+"명";
  // rebuild page 4 content
  document.getElementById("page4").innerHTML=buildQuadPage(4);
  renderTable(4);
  renderQuadCounts(4);
  // update quick btn states
  [500,1000,2000,3000,5000].forEach(n=>{
    const b=document.getElementById("qb"+n);
    if(b) b.className="qbtn"+(n===customThr?" active":"");
  });
}
function setQuickThr(v){
  customThr=v;
  const inp=document.getElementById("customInp");
  if(inp) inp.value=v;
  updateCustom(v);
}

/* ════════════════════════════════════════
   TAB SWITCH
════════════════════════════════════════ */
function switchTab(idx){
  activeTab=idx;
  document.querySelectorAll(".page").forEach((p,i)=>{
    p.className="page"+(i===idx?" active":"");
  });
  document.querySelectorAll(".tabnav button").forEach((b,i)=>{
    b.className=i===idx?"active":"";
  });
  const thr=getThreshold(idx);
  document.getElementById("curBadge").textContent=
    idx===3?"6분면 (3,000/1,000명)":thr.toLocaleString()+"명";
  renderTable(idx);
  renderQuadCounts(idx);
  if(idx===3) renderSixZoneTierCards();
}

function renderSixZoneTierCards(){
  const classify=getClassifier(3);
  const cnt={q1:0,q2:0,q3:0,q4:0,q5:0,q6:0};
  DB.forEach(d=>{const q=classify(d);if(q)cnt[q]++;});
  [
    {zones:["q1","q2"],oZ:["q1"],xZ:["q2"]},
    {zones:["q5","q6"],oZ:["q6"],xZ:["q5"]},
    {zones:["q3","q4"],oZ:["q4"],xZ:["q3"]},
  ].forEach(({zones,oZ,xZ})=>{
    const key=zones.join("_");
    const tot=zones.reduce((s,z)=>s+cnt[z],0);
    const oCnt=oZ.reduce((s,z)=>s+cnt[z],0);
    const xCnt=xZ.reduce((s,z)=>s+cnt[z],0);
    const el=document.getElementById("tier_"+key);
    if(el) el.textContent=tot+"개";
    const oel=document.getElementById("tier_o_"+key);
    if(oel) oel.textContent="담당자O: "+oCnt;
    const xel=document.getElementById("tier_x_"+key);
    if(xel) xel.textContent="담당자X: "+xCnt;
  });
}

/* ════════════════════════════════════════
   EDIT MODAL
════════════════════════════════════════ */
let editId=null;
function openEditModal(id){
  editId=id;
  document.getElementById("editModal").classList.add("open");
  document.getElementById("modalTitle").textContent=id?"기관 정보 편집":"신규 금융기관 추가";
  if(id){
    const d=DB.find(x=>x.id===id)||{};
    document.getElementById("fName").value=d.name||"";
    document.getElementById("fCat1").value=d.cat1||"1금융권";
    document.getElementById("fCat2").value=d.cat2||"";
    document.getElementById("fGroup").value=d.group||"";
    document.getElementById("fEmp").value=d.emp||"";
    document.getElementById("fRep").value=d.rep||"";
    document.getElementById("fSol").value=d.sol||"";
    document.getElementById("fNote").value=notes[id]||"";
  } else {
    ["fName","fCat2","fGroup","fEmp","fNote"].forEach(i=>document.getElementById(i).value="");
    document.getElementById("fCat1").value="1금융권";
    document.getElementById("fRep").value="O";
    document.getElementById("fSol").value="O";
  }
}
function closeModal(){
  document.getElementById("editModal").classList.remove("open");
}
function saveRecord(){
  const name=document.getElementById("fName").value.trim();
  if(!name){alert("기관명을 입력해주세요.");return;}
  const rec={
    id:editId||++nextId, name,
    cat1:document.getElementById("fCat1").value,
    cat2:document.getElementById("fCat2").value.trim(),
    group:document.getElementById("fGroup").value.trim()||"-",
    emp:parseInt(document.getElementById("fEmp").value)||null,
    rep:document.getElementById("fRep").value||null,
    sol:document.getElementById("fSol").value||null,
  };
  const noteVal=document.getElementById("fNote").value.trim();
  if(noteVal) notes[rec.id]=noteVal;
  if(editId){const i=DB.findIndex(x=>x.id===editId);if(i>=0)DB[i]=rec;}
  else DB.push(rec);
  closeModal();
  // refresh all visible
  document.getElementById("topSub").textContent=`대한민국 금융권 전수 리스트 2026 · ${DB.length}개 핵심 기관 · PDCA 전략 실행`;
  renderTable(activeTab);
  renderQuadCounts(activeTab);
  if(activeTab===3) renderSixZoneTierCards();
}
function deleteRecord(id){
  if(!confirm("이 기관을 삭제하시겠습니까?")) return;
  DB=DB.filter(x=>x.id!==id);
  renderTable(activeTab);
  renderQuadCounts(activeTab);
  if(activeTab===3) renderSixZoneTierCards();
}
document.getElementById("editModal").addEventListener("click",function(e){if(e.target===this)closeModal();});

/* ════════════════════════════════════════
   INIT — BUILD ALL PAGES
════════════════════════════════════════ */
document.getElementById("page0").innerHTML=buildQuadPage(0);
document.getElementById("page1").innerHTML=buildQuadPage(1);
document.getElementById("page2").innerHTML=buildQuadPage(2);
document.getElementById("page3").innerHTML=buildSixPage();
document.getElementById("page4").innerHTML=buildQuadPage(4);

// Initial render for all tabs
[0,1,2,3,4].forEach(i=>{renderTable(i);renderQuadCounts(i);});
renderSixZoneTierCards();
</script>
</body>
